version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: w3_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: driver_performance
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - w3_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel -d driver_performance"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Metabase needs its own DB schema — we create it via an init script
  postgres-init:
    image: postgres:16
    container_name: w3_postgres_init
    restart: "no"
    environment:
      PGPASSWORD: secret
    command: >
      sh -c "until pg_isready -h postgres -U laravel; do sleep 1; done &&
             psql -h postgres -U laravel -d driver_performance -c 'CREATE DATABASE metabase;' 2>/dev/null || true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - w3_net

  redis:
    image: redis:7-alpine
    container_name: w3_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - w3_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-laravel
      dockerfile: Dockerfile
    container_name: w3_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: driver_performance
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      CACHE_DRIVER: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      # Only mount the data folder so the seeder can read the CSV
      - ./data:/var/www/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - w3_net

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: w3_frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - w3_net

  metabase:
    image: metabase/metabase:latest
    container_name: w3_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: laravel
      MB_DB_PASS: secret
      MB_DB_HOST: postgres
    depends_on:
      - postgres-init
    networks:
      - w3_net
    volumes:
      - metabase_data:/metabase-data

volumes:
  pgdata:
  metabase_data:

networks:
  w3_net:
    driver: bridge
